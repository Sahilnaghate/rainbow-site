<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- 03-appetite — Kitchen King promo, Frame 3 (Appetite). All render content lives inside <template>. -->
  </head>
  <body>
    <template>
      <style>
        @import url("https://fonts.googleapis.com/css2?family=Shrikhand&display=swap");

        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
        }

        /* ── Layer 0: full-bleed food photo (background) ── */
        .app03-photowrap {
          position: absolute;
          inset: 0;
          overflow: hidden;
        }
        .app03-photo {
          position: absolute;
          left: 50%;
          top: 50%;
          width: 118%;
          height: 118%;
          transform: translate(-50%, -50%) scale(1);
          object-fit: cover;
          will-change: transform;
        }

        /* ── Layer 1: warm grade + edge vignette ── */
        .app03-grade {
          position: absolute;
          inset: 0;
          pointer-events: none;
          background:
            radial-gradient(100% 100% at 50% 44%, rgba(74, 22, 14, 0) 52%, rgba(24, 10, 6, 0.62) 100%),
            linear-gradient(180deg, rgba(250, 162, 25, 0.1) 0%, rgba(42, 22, 12, 0.12) 100%);
        }

        /* ── Layer 2: cream strip w/ red display type ── */
        .app03-strip {
          position: absolute;
          left: 0;
          right: 0;
          top: 610px;
          padding: 40px 0;
          background: #fff3e2;
          box-shadow: 0 -14px 40px rgba(0, 0, 0, 0.35);
          text-align: center;
          transform-origin: 50% 100%;
          will-change: transform, opacity;
          opacity: 0;
        }
        .app03-strip-text {
          font-family: "Shrikhand", "Georgia", serif;
          font-weight: 400;
          font-size: 70px;
          line-height: 1;
          color: #d22c2e;
          letter-spacing: 0.01em;
          white-space: nowrap;
        }
      </style>

      <div id="root" data-composition-id="03-appetite" data-start="0" data-duration="4.901" data-width="1080" data-height="1080">
        <div id="03-appetite-photowrap" class="clip app03-photowrap" data-start="0" data-duration="4.901" data-track-index="0">
          <img id="03-appetite-photo" class="app03-photo" src="assets/kitchenking-masala.jpg" alt="Kitchen King veg gravy" />
        </div>
        <div id="03-appetite-grade" class="clip app03-grade" data-start="0" data-duration="4.901" data-track-index="1"></div>
        <div id="03-appetite-strip" class="clip app03-strip" data-start="0" data-duration="4.901" data-track-index="2">
          <div class="app03-strip-text">ONE BLEND. EVERY GRAVY.</div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          var DUR = 4.901;
          var tl = gsap.timeline({ paused: true });

          var photo = document.getElementById("03-appetite-photo");
          var strip = document.getElementById("03-appetite-strip");

          /* Scene 1+3: single slow Ken Burns push across the whole frame (one move) */
          tl.fromTo(
            photo,
            { scale: 1.0, x: -18, y: -10 },
            { scale: 1.12, x: 14, y: 8, duration: DUR, ease: "power1.inOut" },
            0
          );

          /* Scene 2: cream strip slides up on "every gravy" */
          tl.fromTo(
            strip,
            { opacity: 0, y: 90, scaleY: 0.9 },
            { opacity: 1, y: 0, scaleY: 1, duration: 0.6, ease: "power3.out" },
            2.0
          );

          window.__timelines["03-appetite"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
