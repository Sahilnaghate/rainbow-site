<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <!-- 01-hook — Kitchen King promo, Frame 1 (Hook). All render content lives inside <template>. -->
  </head>
  <body>
    <template>
      <style>
        /* Shrikhand display face — frame.md Known Gaps: "Shrikhand … via Google Fonts". */
        @import url("https://fonts.googleapis.com/css2?family=Shrikhand&display=swap");

        /* Root styled via #root only (never a class on the data-composition-id element). */
        #root {
          position: absolute;
          inset: 0;
          overflow: hidden;
          /* No background here — the full-bleed ground is a dedicated clip layer below. */
        }

        /* ── Layer 1: maroon ground (full-bleed clip, lowest track) ── */
        .hook01-ground {
          position: absolute;
          inset: 0;
          background: radial-gradient(120% 120% at 50% 38%, #4a160e 0%, #38120c 52%, #2a160c 100%);
        }

        /* ── Layer 2: amber spice-particle field ── */
        .hook01-particles {
          position: absolute;
          inset: 0;
          pointer-events: none;
        }
        .hook01-p {
          position: absolute;
          border-radius: 50%;
          background: #faa219;
          will-change: transform, opacity;
        }

        /* ── Layer 3: edge vignette ── */
        .hook01-vignette {
          position: absolute;
          inset: 0;
          pointer-events: none;
          background: radial-gradient(
            95% 95% at 50% 46%,
            rgba(0, 0, 0, 0) 55%,
            rgba(16, 7, 4, 0.55) 100%
          );
        }

        /* ── Layer 4: type block (upper-third, centered) ── */
        .hook01-stage {
          position: absolute;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: flex-start;
          padding-top: 316px; /* block sits in the upper third; everything ends well above y=900 */
          box-sizing: border-box;
        }
        .hook01-glow {
          /* ambient-glow-bloom (bloom-and-hold form): radial halo BEHIND the type */
          position: absolute;
          z-index: 1;
          left: 50%;
          top: 470px;
          width: 980px;
          height: 760px;
          margin-left: -490px;
          margin-top: -380px;
          background: radial-gradient(
            50% 50% at 50% 50%,
            rgba(250, 162, 25, 0.65) 0%,
            rgba(210, 44, 46, 0.28) 42%,
            rgba(42, 22, 12, 0) 72%
          );
          opacity: 0;
          pointer-events: none;
          will-change: transform, opacity;
        }
        .hook01-line {
          position: relative;
          z-index: 2;
          font-family: "Shrikhand", "Georgia", serif;
          font-weight: 400;
          text-align: center;
          white-space: nowrap;
          will-change: transform, filter, opacity;
        }
        .hook01-line1 {
          font-size: 108px; /* display, cream — never pure #fff */
          line-height: 1;
          color: #fff3e2;
          letter-spacing: 0.01em;
        }
        .hook01-line2 {
          font-size: 142px; /* the heavier hit — brand red, tilted (rotation held in GSAP) */
          line-height: 0.95;
          color: #d22c2e;
          margin-top: 14px;
        }
        .hook01-rule {
          position: relative;
          z-index: 2;
          width: 260px;
          height: 7px;
          margin-top: 44px;
          background: #faa219;
          transform-origin: 50% 50%;
          will-change: transform, opacity;
        }
      </style>

      <div id="root" data-composition-id="01-hook" data-start="0" data-duration="1.878" data-width="1080" data-height="1080">
        <!-- Scene 1 layers: ground / particles / vignette (layered depth, full duration) -->
        <div
          id="01-hook-ground"
          class="clip hook01-ground"
          data-start="0"
          data-duration="1.878"
          data-track-index="0"
        ></div>

        <div
          id="01-hook-particles"
          class="clip hook01-particles"
          data-start="0"
          data-duration="1.878"
          data-track-index="1"
        ></div>

        <div
          id="01-hook-vignette"
          class="clip hook01-vignette"
          data-start="0"
          data-duration="1.878"
          data-track-index="2"
        ></div>

        <!-- Scene 2+3: type block + glow (clip spans full duration; reveals are VO-paced) -->
        <div
          id="01-hook-stage"
          class="clip hook01-stage"
          data-start="0"
          data-duration="1.878"
          data-track-index="3"
        >
          <div id="01-hook-glow" class="hook01-glow"></div>
          <div id="01-hook-line1" class="hook01-line hook01-line1">EVERY KITCHEN</div>
          <div id="01-hook-line2" class="hook01-line hook01-line2">HAS A KING.</div>
          <div id="01-hook-rule" class="hook01-rule"></div>
        </div>
      </div>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          var DUR = 1.378;
          var tl = gsap.timeline({ paused: true });

          /* ── Scene 1 (0 → ~0.15s, then underneath everything): amber particle drift ──
             Deterministic seeded LCG (no unseeded Math.random). Particles are built
             synchronously before the timeline tweens are added. */
          var seed = 20260717;
          function rnd() {
            seed = (seed * 1664525 + 1013904223) % 4294967296;
            return seed / 4294967296;
          }
          var field = document.getElementById("01-hook-particles");
          var i, p, size, x, y, op, drift;
          for (i = 0; i < 16; i++) {
            p = document.createElement("div");
            p.className = "hook01-p";
            size = 3 + rnd() * 5; /* 3–8px flecks */
            x = 40 + rnd() * 1000;
            y = 180 + rnd() * 860; /* spawn across the frame; drift is upward */
            op = 0.16 + rnd() * 0.34;
            p.style.width = size.toFixed(1) + "px";
            p.style.height = size.toFixed(1) + "px";
            p.style.left = x.toFixed(1) + "px";
            p.style.top = y.toFixed(1) + "px";
            p.style.opacity = op.toFixed(2);
            field.appendChild(p);
            drift = 46 + rnd() * 84; /* slow rise, linear — the "still hold" motion */
            tl.fromTo(p, { y: 0 }, { y: -drift, duration: DUR, ease: "none" }, 0);
          }

          /* ── Scene 2 (VO-paced): the two-hit slam (kinetic-beat-slam mechanics —
             distinct entrances per phrase, short percussive attacks) ── */
          var line1 = document.getElementById("01-hook-line1");
          var line2 = document.getElementById("01-hook-line2");
          var rule = document.getElementById("01-hook-rule");
          var glow = document.getElementById("01-hook-glow");

          /* "EVERY KITCHEN" slams in on the words — scale + blur, hard slam ease */
          tl.fromTo(
            line1,
            { scale: 1.6, opacity: 0, filter: "blur(14px)" },
            { scale: 1, opacity: 1, filter: "blur(0px)", duration: 0.36, ease: "power4.out" },
            0.12
          );

          /* "HAS A KING." punches beneath with a heavier hit — bigger scale + drop,
             tilt (-4°) held inside the fromTo so GSAP never drops it */
          tl.fromTo(
            line2,
            { scale: 2.05, y: 46, rotation: -4, opacity: 0, filter: "blur(18px)" },
            {
              scale: 1,
              y: 0,
              rotation: -4,
              opacity: 1,
              filter: "blur(0px)",
              duration: 0.4,
              ease: "power4.out",
            },
            0.62
          );

          /* impact shudder: line1 takes the hit as line2 lands (finite, two tweens — no yoyo) */
          tl.to(line1, { y: 7, duration: 0.07, ease: "power2.out" }, 0.66);
          tl.to(line1, { y: 0, duration: 0.16, ease: "power3.out" }, 0.73);

          /* thin amber rule draws under the block */
          tl.fromTo(
            rule,
            { scaleX: 0, opacity: 0 },
            { scaleX: 1, opacity: 1, duration: 0.28, ease: "power3.out" },
            0.94
          );

          /* ── Scene 3 (held read): subtle glow bloom behind the block; type stays
             still, particles keep drifting (ambient-glow-bloom, bloom-and-hold) ── */
          tl.fromTo(
            glow,
            { opacity: 0, scale: 0.85 },
            { opacity: 0.3, scale: 1, duration: 0.36, ease: "power2.out" },
            1.0
          );

          window.__timelines["01-hook"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
